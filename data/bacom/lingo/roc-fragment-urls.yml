---
# =============================================================================
# BACOM Lingo ROC (Region Only Content) Fragment Swapping Test URLs
# Feature: MWPW-179495
#
# TEST SCOPE:
# -----------
# Language   | Base | All Regionals                    | Tested        | Skipped
# -----------|------|----------------------------------|---------------|------------------
# French     | /fr  | /be_fr, /ca_fr, /ch_fr, /lu_fr   | /ch_fr, /ca_fr| /be_fr, /lu_fr
# German     | /de  | /at, /ch_de, /lu_de              | /at, /ch_de   | /lu_de
# Spanish    | /es  | /la (only regional)              | /la + all LATAM GeoIPs | -
# Italian    | /it  | /ch_it                           | /ch_it        | -
# Portuguese | /pt  | /br                              | /br           | -
#
# LATAM MEP-LINGO:
# ----------------
# /la is the only regional site for /es. When visiting /es/ with a LATAM GeoIP,
# mep-lingo should pull fragment content from /la/fragments.
# LATAM GeoIP codes: bo, cr, do, ec, gt, pa, pr, py, sv, uy, ve, ar, cl, co, mx, pe
#
# FEATURE COVERAGE:
# -----------------
# FULL FEATURES (all mep-lingo blocks):
#   - /ch_fr (Swiss French)
#   - /la (Latin America) - replaces /mx
#   Fragments: textmeplingoblock, swapblock, sectionreplacement, noroc (fallback)
#
# LATAM MEP-LINGO (on /es/ base with LATAM GeoIP → /la/ fragments):
#   - All 16 LATAM GeoIP codes tested
#
# BASIC TEST (textmeplingoblock only):
#   - /ca_fr (Canadian French)
#   - /at (Austrian)
#   - /ch_de (Swiss German)
#   - /ch_it (Swiss Italian)
#   - /br (Brazilian)
#   Fragment: textmeplingoblock only
#
# =============================================================================

# Base URL - Live environment (aem.page requires auth, use aem.live)
baseUrl: 'https://stage--da-bacom--adobecom.aem.live'

# Milo libs params for ROC testing
miloLibs: '?milolibs=stage&langfirst=on&mepHighlight=true&mep='

# =============================================================================
# FRENCH - FULL FEATURE TEST (/ch_fr)
# URL: https://stage--da-bacom--adobecom.aem.live/fr/drafts/mepqa/fragments/base?milolibs=stage&langfirst=on&mepHighlight=true&mep=&akamaiLocale=ch_fr
# =============================================================================
'fr-base':
  pageUrl: '/fr/drafts/mepqa/fragments/base'
  akamaiLocale: ''
  testType: 'base'
  description: 'French base page - no region spoof'

'fr-ch-swap':
  pageUrl: '/fr/drafts/mepqa/fragments/base'
  akamaiLocale: 'ch_fr'
  testType: 'full'
  expectedFragments:
    swapped:
      - '/ch_fr/drafts/mepqa/fragments/textmeplingoblock'
      - '/ch_fr/drafts/mepqa/fragments/swapblock'
      - '/ch_fr/drafts/mepqa/fragments/sectionreplacement'
    fallback:
      - '/fr/drafts/mepqa/fragments/noroc'
  description: 'French → Swiss French - FULL FEATURE TEST'

# =============================================================================
# FRENCH - BASIC TEST (/ca_fr) - textmeplingoblock only
